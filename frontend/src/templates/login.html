{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2>系统登录</h2>
        <form method="POST">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">立即进入</button>
        </form>
        <p>还没有账号？ <a href="{{ url_for('main.register') }}">创建新账号</a></p>
    </div>
</div>
{% endblock %}
