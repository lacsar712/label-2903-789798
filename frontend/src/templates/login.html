{% extends "base.html" %}
{% block title %}<span data-i18n="login_title">系统登录</span>{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 data-i18n="login_title">系统登录</h2>
        <form method="POST">
            <div class="form-group">
                <label data-i18n="login_username">用户名</label>
                <input type="text" name="username" data-i18n-placeholder="login_username_placeholder" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label data-i18n="login_password">密码</label>
                <input type="password" name="password" data-i18n-placeholder="login_password_placeholder" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn" data-i18n="login_submit">立即进入</button>
        </form>
        {% if self_registration_enabled %}
        <p><span data-i18n="login_no_account">还没有账号？</span> <a href="{{ url_for('main.register') }}" data-i18n="login_create_account">创建新账号</a></p>
        {% endif %}
    </div>
</div>
{% endblock %}
