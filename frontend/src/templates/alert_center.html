{% extends "base.html" %}
{% block title %}异动订阅中心{% endblock %}
{% block content %}

<div class="alert-center-page">
    <div class="alert-header">
        <div class="alert-header-left">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 10px; color: #fbbf24;">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <h2 data-i18n="alert_center_title">市场异动订阅中心</h2>
            <p class="alert-subtitle" data-i18n="alert_center_subtitle">设定监测规则，系统自动追踪行业脉搏，异常即时推送</p>
        </div>
        <div class="alert-header-right">
            <button class="btn btn-alert-check" onclick="runAlertCheck()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                <span data-i18n="alert_btn_check_now">立即检测</span>
            </button>
            <button class="btn btn-alert-add" onclick="openRuleModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span data-i18n="alert_btn_new_rule">新建规则</span>
            </button>
        </div>
    </div>

    <div class="alert-stats">
        <div class="stat-card">
            <div class="stat-icon stat-icon-total">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                </svg>
            </div>
            <div class="stat-info">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label" data-i18n="alert_stat_total">全部规则</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon stat-icon-active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
            </div>
            <div class="stat-info">
                <div class="stat-value" id="statActive">0</div>
                <div class="stat-label" data-i18n="alert_stat_active">运行中</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon stat-icon-alert">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
            </div>
            <div class="stat-info">
                <div class="stat-value" id="statAlerts">0</div>
                <div class="stat-label" data-i18n="alert_stat_unread">未读异动</div>
            </div>
        </div>
    </div>

    <div class="rule-list-header">
        <h3 data-i18n="alert_rule_list_title">我的监测规则</h3>
    </div>

    <div class="rule-list" id="ruleList">
        <div class="empty-state" id="emptyState">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: rgba(255,255,255,0.2); margin-bottom: 20px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <p data-i18n="alert_empty_rules">暂无监测规则</p>
            <p style="font-size: 13px; color: var(--text-secondary); margin-top: 8px;" data-i18n="alert_empty_hint">点击右上角「新建规则」开始订阅市场异动</p>
        </div>
    </div>
</div>

<div id="ruleModal" class="modal-overlay" style="display: none; z-index: 2500;">
    <div class="modal modal-large">
        <h4 id="ruleModalTitle" data-i18n="rule_modal_create_title">新建监测规则</h4>
        <div class="rule-form">
            <div class="form-group">
                <label data-i18n="rule_label_name">规则名称</label>
                <input type="text" id="ruleName" data-i18n-placeholder="rule_input_name_placeholder" placeholder="例如：特斯拉季度销量异动监测" maxlength="200">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="rule_label_type">规则类型</label>
                    <select id="ruleType" onchange="onRuleTypeChange()">
                        <option value="sales" data-i18n="rule_type_sales">销量异动</option>
                        <option value="charging_pile" data-i18n="rule_type_pile">充电桩密度异动</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="rule_label_dimension">监测维度</label>
                    <select id="ruleDimension" onchange="onDimensionChange()">
                        <option value="brand" data-i18n="rule_dim_brand">品牌维度</option>
                        <option value="region" data-i18n="rule_dim_region">区域维度</option>
                        <option value="brand_region" data-i18n="rule_dim_brand_region">品牌+区域</option>
                    </select>
                </div>
            </div>

            <div id="targetValueSection">
                <div class="form-row" id="brandRow">
                    <div class="form-group">
                        <label data-i18n="rule_label_select_brand">选择品牌</label>
                        <select id="targetBrand">
                            <option value="">-- 请选择品牌 --</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" id="regionRow" style="display: none;">
                    <div class="form-group">
                        <label data-i18n="rule_label_select_province">选择省份</label>
                        <select id="targetRegion">
                            <option value="">-- 请选择省份 --</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" id="brandRegionRow" style="display: none;">
                    <div class="form-group">
                        <label data-i18n="rule_label_province">省份</label>
                        <select id="targetRegion2">
                            <option value="">-- 请选择省份 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="rule_label_brand_optional">品牌（可选）</label>
                        <select id="targetBrand2">
                            <option value="" data-i18n="rule_all_brands">全部品牌</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" id="pileRegionRow" style="display: none;">
                    <div class="form-group">
                        <label data-i18n="rule_label_select_province">选择省份</label>
                        <select id="targetPileRegion">
                            <option value="">-- 请选择省份 --</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="rule_label_metric">监测指标</label>
                    <select id="ruleMetric" onchange="onMetricChange()">
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="rule_label_condition">判定条件</label>
                    <select id="ruleCondition">
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="rule_label_threshold">阈值</label>
                    <input type="number" id="ruleThreshold" data-i18n-placeholder="rule_input_threshold_placeholder" placeholder="请输入阈值" step="0.01">
                </div>
                <div class="form-group" id="consecutiveGroup" style="display: none;">
                    <label data-i18n="rule_label_consecutive">连续期数</label>
                    <input type="number" id="ruleConsecutive" data-i18n-placeholder="rule_input_consecutive_placeholder" placeholder="连续多少期" value="2" min="2">
                </div>
            </div>
            <div class="rule-preview">
                <div class="preview-label" data-i18n="rule_preview_label">规则预览</div>
                <div class="preview-content" id="rulePreview">请填写规则参数...</div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn" style="background: #334155;" onclick="closeRuleModal()" data-i18n="modal_btn_cancel">取消</button>
            <button class="btn" onclick="saveRule()" id="saveRuleBtn" data-i18n="rule_btn_save">保存规则</button>
        </div>
    </div>
</div>

<script>
let alertMeta = null;
let ruleList = [];
let editingRuleId = null;

function loadAlertMeta() {
    fetch('/api/alert/meta')
        .then(r => r.json())
        .then(data => {
            alertMeta = data;
            populateMetaSelects();
        })
        .catch(e => console.error('Failed to load meta:', e));
}

function populateMetaSelects() {
    if (!alertMeta) return;

    const brandSelects = ['targetBrand', 'targetBrand2'];
    brandSelects.forEach(id => {
        const sel = document.getElementById(id);
        if (sel) {
            sel.innerHTML = id === 'targetBrand2' ? `<option value="" data-i18n="rule_all_brands">${t('rule_all_brands')}</option>` : '<option value="">-- 请选择品牌 --</option>';
            alertMeta.brands.forEach(b => {
                sel.innerHTML += `<option value="${b}">${b}</option>`;
            });
        }
    });

    const regionSelects = ['targetRegion', 'targetRegion2', 'targetPileRegion'];
    regionSelects.forEach(id => {
        const sel = document.getElementById(id);
        if (sel) {
            sel.innerHTML = '<option value="">-- 请选择省份 --</option>';
            alertMeta.provinces.forEach(p => {
                sel.innerHTML += `<option value="${p}">${p}</option>`;
            });
        }
    });

    updateMetricOptions();
    updateConditionOptions();
}

function updateMetricOptions() {
    const ruleType = document.getElementById('ruleType').value;
    const metricSel = document.getElementById('ruleMetric');
    const metrics = alertMeta ? alertMeta.metrics[ruleType] || [] : [];
    metricSel.innerHTML = metrics.map(m => `<option value="${m.value}" data-i18n="${m.i18n_key || m.value}">${t(m.i18n_key || m.value)}</option>`).join('');
    onMetricChange();
}

function updateConditionOptions() {
    const condSel = document.getElementById('ruleCondition');
    const conditions = alertMeta ? alertMeta.conditions : [];
    condSel.innerHTML = conditions.map(c => `<option value="${c.value}" data-i18n="${c.i18n_key || c.value}">${t(c.i18n_key || c.value)}</option>`).join('');
}

function onRuleTypeChange() {
    const ruleType = document.getElementById('ruleType').value;
    const dimSel = document.getElementById('ruleDimension');
    const brandRow = document.getElementById('brandRow');
    const regionRow = document.getElementById('regionRow');
    const brandRegionRow = document.getElementById('brandRegionRow');
    const pileRegionRow = document.getElementById('pileRegionRow');

    if (ruleType === 'charging_pile') {
        dimSel.innerHTML = `<option value="province" data-i18n="rule_dim_province">${t('rule_dim_province')}</option>`;
        brandRow.style.display = 'none';
        regionRow.style.display = 'none';
        brandRegionRow.style.display = 'none';
        pileRegionRow.style.display = 'flex';
    } else {
        dimSel.innerHTML = `
            <option value="brand" data-i18n="rule_dim_brand">${t('rule_dim_brand')}</option>
            <option value="region" data-i18n="rule_dim_region">${t('rule_dim_region')}</option>
            <option value="brand_region" data-i18n="rule_dim_brand_region">${t('rule_dim_brand_region')}</option>
        `;
        pileRegionRow.style.display = 'none';
        onDimensionChange();
    }
    updateMetricOptions();
    updateRulePreview();
}

function onDimensionChange() {
    const dim = document.getElementById('ruleDimension').value;
    const ruleType = document.getElementById('ruleType').value;
    const brandRow = document.getElementById('brandRow');
    const regionRow = document.getElementById('regionRow');
    const brandRegionRow = document.getElementById('brandRegionRow');

    if (ruleType === 'charging_pile') return;

    brandRow.style.display = dim === 'brand' ? 'flex' : 'none';
    regionRow.style.display = dim === 'region' ? 'flex' : 'none';
    brandRegionRow.style.display = dim === 'brand_region' ? 'flex' : 'none';
    updateRulePreview();
}

function onMetricChange() {
    const metric = document.getElementById('ruleMetric').value;
    const consecGroup = document.getElementById('consecutiveGroup');
    const condSel = document.getElementById('ruleCondition');
    const thresholdInput = document.getElementById('ruleThreshold');

    if (metric === 'consecutive_decline') {
        consecGroup.style.display = 'flex';
        condSel.value = 'gte';
        condSel.disabled = true;
        thresholdInput.value = '2';
        thresholdInput.disabled = true;
    } else {
        consecGroup.style.display = 'none';
        condSel.disabled = false;
        thresholdInput.disabled = false;
    }
    updateRulePreview();
}

function updateRulePreview() {
    const name = document.getElementById('ruleName').value || t('preview_default_name');
    const ruleType = document.getElementById('ruleType').value;
    const dim = document.getElementById('ruleDimension').value;
    const metric = document.getElementById('ruleMetric').value;
    const cond = document.getElementById('ruleCondition').value;
    const threshold = document.getElementById('ruleThreshold').value;
    const consec = document.getElementById('ruleConsecutive').value;

    let target = '';
    if (ruleType === 'charging_pile') {
        target = document.getElementById('targetPileRegion').value;
    } else if (dim === 'brand') {
        target = document.getElementById('targetBrand').value;
    } else if (dim === 'region') {
        target = document.getElementById('targetRegion').value;
    } else if (dim === 'brand_region') {
        const r = document.getElementById('targetRegion2').value;
        const b = document.getElementById('targetBrand2').value;
        target = b ? `${r} - ${b}` : r;
    }

    const unit = metric === 'change_rate' ? '%' : (metric === 'density' ? ` ${t('preview_unit_density')}` : ` ${t('preview_unit_sales')}`);

    let previewText = `${t('preview_prefix')}【${target || t('preview_target')}】${t('preview_metric_prefix')}【${t('metric_' + metric) || metric}】`;
    if (metric === 'consecutive_decline') {
        previewText += `${t('preview_consecutive_prefix')}【${consec || 'N'}】${t('preview_consecutive_suffix')}`;
    } else {
        previewText += `【${t('cond_' + cond) || cond}】 ${threshold || '?'}${unit} ${t('preview_trigger_suffix')}`;
    }

    document.getElementById('rulePreview').textContent = previewText;
}

function openRuleModal(rule = null) {
    editingRuleId = rule ? rule.id : null;
    document.getElementById('ruleModalTitle').textContent = rule ? t('rule_modal_edit_title') : t('rule_modal_create_title');
    document.getElementById('saveRuleBtn').textContent = rule ? t('rule_btn_update') : t('rule_btn_save');

    document.getElementById('ruleName').value = rule ? rule.name : '';
    document.getElementById('ruleType').value = rule ? rule.rule_type : 'sales';
    document.getElementById('ruleCondition').value = rule ? rule.condition : 'lt';
    document.getElementById('ruleThreshold').value = rule ? rule.threshold : '';
    document.getElementById('ruleConsecutive').value = rule ? rule.consecutive_periods : 2;

    if (!alertMeta) {
        loadAlertMeta();
    }
    setTimeout(() => {
        onRuleTypeChange();
        if (rule) {
            document.getElementById('ruleDimension').value = rule.dimension;
            onDimensionChange();
            if (rule.rule_type === 'charging_pile') {
                document.getElementById('targetPileRegion').value = rule.target_value || '';
            } else if (rule.dimension === 'brand') {
                document.getElementById('targetBrand').value = rule.target_value || '';
            } else if (rule.dimension === 'region') {
                document.getElementById('targetRegion').value = rule.target_value || '';
            } else if (rule.dimension === 'brand_region') {
                const parts = rule.target_value ? rule.target_value.split('|') : ['', ''];
                document.getElementById('targetRegion2').value = parts[0];
                document.getElementById('targetBrand2').value = parts[1] || '';
            }
            document.getElementById('ruleMetric').value = rule.metric;
            onMetricChange();
        }
        updateRulePreview();
    }, 100);

    document.getElementById('ruleModal').style.display = 'flex';
}

function closeRuleModal() {
    document.getElementById('ruleModal').style.display = 'none';
    editingRuleId = null;
}

function getFormTargetValue() {
    const ruleType = document.getElementById('ruleType').value;
    const dim = document.getElementById('ruleDimension').value;
    if (ruleType === 'charging_pile') {
        return document.getElementById('targetPileRegion').value;
    } else if (dim === 'brand') {
        return document.getElementById('targetBrand').value;
    } else if (dim === 'region') {
        return document.getElementById('targetRegion').value;
    } else if (dim === 'brand_region') {
        const r = document.getElementById('targetRegion2').value;
        const b = document.getElementById('targetBrand2').value;
        return b ? `${r}|${b}` : r;
    }
    return '';
}

async function saveRule() {
    const name = document.getElementById('ruleName').value.trim();
    if (!name) {
        showToast(t('toast_rule_enter_name'), 'danger');
        return;
    }

    const target = getFormTargetValue();
    if (!target) {
        showToast(t('toast_rule_select_target'), 'danger');
        return;
    }

    const threshold = document.getElementById('ruleThreshold').value;
    if (threshold === '' || threshold === null) {
        showToast(t('toast_rule_enter_threshold'), 'danger');
        return;
    }

    const payload = {
        name: name,
        rule_type: document.getElementById('ruleType').value,
        dimension: document.getElementById('ruleDimension').value,
        target_value: target,
        metric: document.getElementById('ruleMetric').value,
        condition: document.getElementById('ruleCondition').value,
        threshold: parseFloat(threshold),
        consecutive_periods: parseInt(document.getElementById('ruleConsecutive').value) || 1
    };

    try {
        const url = editingRuleId ? `/api/alert/rules/${editingRuleId}` : '/api/alert/rules';
        const method = editingRuleId ? 'PUT' : 'POST';
        const res = await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
            showToast(data.error || t('toast_rule_save_failed'), 'danger');
            return;
        }
        showToast(editingRuleId ? t('toast_rule_updated') : t('toast_rule_created'), 'success');
        closeRuleModal();
        await loadRules();
    } catch (e) {
        console.error(e);
        showToast(t('toast_rule_save_failed_retry'), 'danger');
    }
}

async function loadRules() {
    try {
        const res = await fetch('/api/alert/rules');
        ruleList = await res.json();
        renderRules();
        updateStats();
    } catch (e) {
        console.error('Failed to load rules:', e);
    }
}

function getRuleDescription(rule) {
    const condLabels = {'gt': '>', 'gte': '≥', 'lt': '<', 'lte': '≤', 'eq': '='};
    const unit = rule.metric === 'change_rate' ? '%' : (rule.metric === 'density' ? ` ${t('preview_unit_density')}` : ` ${t('preview_unit_sales')}`);

    if (rule.metric === 'consecutive_decline') {
        return `${rule.target_value} - ${t('metric_consecutive_decline')}${rule.consecutive_periods}${t('preview_consecutive_suffix')}`;
    }
    return `${rule.target_value} - ${t('metric_' + rule.metric)} ${condLabels[rule.condition]} ${rule.threshold}${unit}`;
}

function renderRules() {
    const list = document.getElementById('ruleList');
    const empty = document.getElementById('emptyState');

    if (ruleList.length === 0) {
        empty.style.display = 'block';
        list.querySelectorAll('.rule-card').forEach(e => e.remove());
        return;
    }
    empty.style.display = 'none';

    const typeLabels = {'sales': t('rule_type_sales'), 'charging_pile': t('rule_type_pile')};
    const typeColors = {'sales': '#38bdf8', 'charging_pile': '#10b981'};

    const existing = list.querySelectorAll('.rule-card');
    existing.forEach(e => e.remove());

    ruleList.forEach(rule => {
        const card = document.createElement('div');
        card.className = 'rule-card' + (rule.is_enabled ? '' : ' rule-disabled');
        card.dataset.ruleId = rule.id;
        card.innerHTML = `
            <div class="rule-card-header">
                <div class="rule-card-title">
                    <span class="rule-type-badge" style="background: ${typeColors[rule.rule_type]}20; color: ${typeColors[rule.rule_type]}; border-color: ${typeColors[rule.rule_type]}40;">
                        ${typeLabels[rule.rule_type]}
                    </span>
                    <span class="rule-name">${rule.name}</span>
                </div>
                <div class="rule-card-actions">
                    <label class="switch">
                        <input type="checkbox" ${rule.is_enabled ? 'checked' : ''} data-rule-id="${rule.id}" class="rule-toggle">
                        <span class="slider"></span>
                    </label>
                    <button class="icon-btn rule-edit-btn" data-rule-id="${rule.id}" data-i18n-title="rule_edit_title" title="编辑">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                    <button class="icon-btn icon-btn-danger rule-delete-btn" data-rule-id="${rule.id}" data-i18n-title="rule_delete_title" title="删除">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="rule-card-body">
                <div class="rule-desc">${getRuleDescription(rule)}</div>
                <div class="rule-meta">
                    <span class="rule-meta-item">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        ${t('rule_meta_created')} ${rule.created_at}
                    </span>
                    ${rule.last_checked ? `<span class="rule-meta-item">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"/>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                        ${t('rule_meta_last_checked')} ${rule.last_checked}
                    </span>` : ''}
                </div>
            </div>
        `;
        list.appendChild(card);
    });

    list.querySelectorAll('.rule-toggle').forEach(cb => {
        cb.addEventListener('change', function() {
            const id = parseInt(this.dataset.ruleId);
            toggleRule(id, this);
        });
    });
    list.querySelectorAll('.rule-edit-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.ruleId);
            const rule = ruleList.find(r => r.id === id);
            if (rule) openRuleModal(rule);
        });
    });
    list.querySelectorAll('.rule-delete-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const id = parseInt(this.dataset.ruleId);
            deleteRule(id);
        });
    });
}

async function toggleRule(id, checkbox) {
    try {
        const res = await fetch(`/api/alert/rules/${id}/toggle`, {method: 'POST'});
        const data = await res.json();
        if (!res.ok) {
            showToast(data.error || t('toast_operation_failed'), 'danger');
            checkbox.checked = !checkbox.checked;
            return;
        }
        showToast(data.is_enabled ? t('toast_rule_enabled') : t('toast_rule_paused'), 'success');
        await loadRules();
    } catch (e) {
        console.error(e);
        checkbox.checked = !checkbox.checked;
        showToast(t('toast_operation_failed'), 'danger');
    }
}

function deleteRule(id) {
    showModal(t('rule_modal_delete_title'), t('rule_modal_delete_confirm'), async () => {
        try {
            const res = await fetch(`/api/alert/rules/${id}`, {method: 'DELETE'});
            if (!res.ok) {
                const data = await res.json();
                showToast(data.error || t('toast_rule_delete_failed'), 'danger');
                return;
            }
            showToast(t('toast_rule_deleted'), 'success');
            await loadRules();
        } catch (e) {
            console.error(e);
            showToast(t('toast_rule_delete_failed'), 'danger');
        }
    });
}

async function runAlertCheck() {
    showToast(t('toast_check_running'), 'info');
    try {
        const res = await fetch('/api/alert/check', {method: 'POST'});
        const data = await res.json();
        if (data.triggered_count > 0) {
            showToast(t('toast_check_found_alerts').replace('{count}', data.triggered_count), 'danger');
        } else {
            showToast(t('toast_check_no_alerts').replace('{count}', data.rules_checked), 'success');
        }
        await loadRules();
        await updateStats();
        if (window.refreshNotificationBadge) {
            window.refreshNotificationBadge();
        }
    } catch (e) {
        console.error(e);
        showToast(t('toast_check_failed'), 'danger');
    }
}

async function updateStats() {
    document.getElementById('statTotal').textContent = ruleList.length;
    document.getElementById('statActive').textContent = ruleList.filter(r => r.is_enabled).length;
    try {
        const res = await fetch('/api/alert/notifications/unread_count');
        const data = await res.json();
        document.getElementById('statAlerts').textContent = data.unread_count;
    } catch (e) {}
}

['ruleName', 'ruleType', 'ruleDimension', 'targetBrand', 'targetRegion', 'targetRegion2', 'targetBrand2', 'targetPileRegion', 'ruleMetric', 'ruleCondition', 'ruleThreshold', 'ruleConsecutive'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', updateRulePreview);
    if (el) el.addEventListener('change', updateRulePreview);
});

document.getElementById('ruleModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('ruleModal')) closeRuleModal();
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeRuleModal();
    if (e.key === 'Enter' && document.getElementById('ruleModal').style.display === 'flex') {
        if (e.target.tagName !== 'TEXTAREA') saveRule();
    }
});

document.addEventListener('DOMContentLoaded', () => {
    loadAlertMeta();
    loadRules();
});
</script>
{% endblock %}
