{% extends "base.html" %}
{% block title %}用户管理{% endblock %}
{% block content %}
<div class="filter-pane">
    <h3><i class="icon"></i> 系统用户管理</h3>
    <button onclick="openUserModal()" class="btn" style="margin-left: auto;">新增用户</button>
</div>

<div class="chart-card col-12" style="height: auto; min-height: 500px;">
    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
            <tr style="text-align: left; border-bottom: 2px solid var(--glass-border); color: var(--text-secondary)">
                <th style="padding: 15px;">用户名</th>
                <th>角色</th>
                <th style="text-align: right; padding-right: 15px;">操作</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- Data loaded via JS -->
        </tbody>
    </table>
</div>

<!-- Add/Edit User Modal -->
<div id="userModal" class="modal-overlay">
    <div class="modal" style="width: 400px; text-align: left;">
        <h4 id="userModalTitle">编辑用户信息</h4>
        <input type="hidden" id="userId">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="userName" required>
        </div>
        <div class="form-group">
            <label>密码 (留空表示不修改)</label>
            <input type="password" id="userPassword">
        </div>
        <div class="form-group">
            <label>角色</label>
            <select id="userRole" style="width: 100%">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <div class="modal-actions" style="margin-top: 30px;">
            <button onclick="closeUserModal()" class="btn" style="background: #334155;">取消</button>
            <button onclick="saveUser()" class="btn">提交保存</button>
        </div>
    </div>
</div>

<script>
    async function loadUsers() {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = users.map(u => `
            <tr style="border-bottom: 1px solid var(--glass-border)">
                <td style="padding: 15px;">${u.username}</td>
                <td>${u.role === 'admin' ? '管理员' : '普通用户'}</td>
                <td style="text-align: right; padding-right: 15px;">
                    <button onclick='openUserEditModal(${JSON.stringify(u)})' class="btn" style="padding: 5px 10px; font-size: 12px;">编辑</button>
                    ${u.username !== 'admin' ? `<button onclick="deleteUser(${u.id})" class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;">删除</button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    function openUserModal() {
        document.getElementById('userModalTitle').innerText = '新增系统用户';
        document.getElementById('userId').value = '';
        document.getElementById('userName').value = '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userRole').value = 'user';
        document.getElementById('userModal').style.display = 'flex';
    }

    function openUserEditModal(u) {
        document.getElementById('userModalTitle').innerText = '编辑用户信息';
        document.getElementById('userId').value = u.id;
        document.getElementById('userName').value = u.username;
        document.getElementById('userPassword').value = '';
        document.getElementById('userRole').value = u.role;
        document.getElementById('userModal').style.display = 'flex';
    }

    function closeUserModal() {
        document.getElementById('userModal').style.display = 'none';
    }

    async function saveUser() {
        const id = document.getElementById('userId').value;
        const data = {
            username: document.getElementById('userName').value,
            password: document.getElementById('userPassword').value,
            role: document.getElementById('userRole').value
        };

        if (!id && !data.password) {
            showToast('新用户必须设置密码', 'danger');
            return;
        }

        const url = id ? `/api/admin/users/${id}` : '/api/admin/users';
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            showToast('保存成功', 'success');
            closeUserModal();
            loadUsers();
        } else {
            const err = await res.json();
            showToast(err.error || '保存失败', 'danger');
        }
    }

    async function deleteUser(id) {
        showModal('确认删除', '确定要删除该用户吗？', async () => {
            const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showToast('已删除', 'success');
                loadUsers();
            } else {
                const err = await res.json();
                showToast(err.error || '删除失败', 'danger');
            }
        });
    }

    window.addEventListener('load', loadUsers);
</script>
{% endblock %}
