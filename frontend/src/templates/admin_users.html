{% extends "base.html" %}
{% block title %}用户管理{% endblock %}
{% block content %}
<div class="filter-pane">
    <h3><i class="icon"></i> <span data-i18n="adminusers_title">系统用户管理</span></h3>
    <button onclick="openUserModal()" class="btn" style="margin-left: auto;" data-i18n="adminusers_add_btn">新增用户</button>
</div>

<div class="chart-card col-12" style="height: auto; min-height: 500px;">
    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
        <thead>
            <tr style="text-align: left; border-bottom: 2px solid var(--glass-border); color: var(--text-secondary)">
                <th style="padding: 15px;" data-i18n="adminusers_col_username">用户名</th>
                <th data-i18n="adminusers_col_role">角色</th>
                <th style="text-align: right; padding-right: 15px;" data-i18n="adminusers_col_action">操作</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <!-- Data loaded via JS -->
        </tbody>
    </table>
</div>

<!-- Add/Edit User Modal -->
<div id="userModal" class="modal-overlay">
    <div class="modal" style="width: 400px; text-align: left;">
        <h4 id="userModalTitle" data-i18n="adminusers_modal_edit_title">编辑用户信息</h4>
        <input type="hidden" id="userId">
        <div class="form-group">
            <label data-i18n="adminusers_label_username">用户名</label>
            <input type="text" id="userName" required>
        </div>
        <div class="form-group">
            <label data-i18n="adminusers_label_password">密码 (留空表示不修改)</label>
            <input type="password" id="userPassword">
        </div>
        <div class="form-group">
            <label data-i18n="adminusers_label_role">角色</label>
            <select id="userRole" style="width: 100%">
                <option value="user" data-i18n="adminusers_role_user">普通用户</option>
                <option value="admin" data-i18n="adminusers_role_admin">管理员</option>
            </select>
        </div>
        <div class="modal-actions" style="margin-top: 30px;">
            <button onclick="closeUserModal()" class="btn" style="background: #334155;" data-i18n="adminusers_btn_cancel">取消</button>
            <button onclick="saveUser()" class="btn" data-i18n="adminusers_btn_save">提交保存</button>
        </div>
    </div>
</div>

<!-- Login History Modal (Admin) -->
<div id="loginLogModal" class="modal-overlay">
    <div class="modal modal-large" style="width: 700px; max-height: 80vh; text-align: left;">
        <h4>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 8px;">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <span data-i18n="admin_login_logs_title">用户登录轨迹</span>
            <span id="loginLogUserName" style="color: var(--accent-color); margin-left: 8px;"></span>
        </h4>
        <div id="loginLogTableWrap" class="login-history-table-wrap" style="max-height: 400px; overflow-y: auto; margin-top: 16px;">
            <table class="login-history-table">
                <thead>
                    <tr>
                        <th data-i18n="login_history_col_time">登录时间</th>
                        <th data-i18n="login_history_col_ip">IP地址</th>
                        <th data-i18n="login_history_col_device">设备/浏览器</th>
                        <th data-i18n="login_history_col_status">状态</th>
                        <th data-i18n="admin_login_logs_col_action">操作</th>
                    </tr>
                </thead>
                <tbody id="loginLogModalBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 30px; color: var(--text-secondary);" data-i18n="login_history_loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="modal-actions" style="margin-top: 24px; justify-content: flex-end;">
            <button onclick="closeLoginLogModal()" class="btn" style="background: #334155;" data-i18n="modal_btn_cancel">关闭</button>
        </div>
    </div>
</div>

<script>
    async function loadUsers() {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = users.map(u => `
            <tr style="border-bottom: 1px solid var(--glass-border)">
                <td style="padding: 15px;">${u.username}</td>
                <td>${u.role === 'admin' ? t('adminusers_role_admin') : t('adminusers_role_user')}</td>
                <td style="text-align: right; padding-right: 15px;">
                    <button onclick='openUserEditModal(${JSON.stringify(u)})' class="btn" style="padding: 5px 10px; font-size: 12px;">${t('adminusers_btn_edit')}</button>
                    <button onclick='viewUserLoginLogs(${JSON.stringify(u)})' class="btn" style="padding: 5px 10px; font-size: 12px; background: linear-gradient(135deg, #818cf8, #6366f1);">${t('adminusers_btn_view_logs')}</button>
                    ${u.username !== 'admin' ? `<button onclick="deleteUser(${u.id})" class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;">${t('adminusers_btn_delete')}</button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    function openUserModal() {
        document.getElementById('userModalTitle').innerText = t('adminusers_modal_add_title');
        document.getElementById('userId').value = '';
        document.getElementById('userName').value = '';
        document.getElementById('userPassword').value = '';
        document.getElementById('userRole').value = 'user';
        document.getElementById('userModal').style.display = 'flex';
    }

    function openUserEditModal(u) {
        document.getElementById('userModalTitle').innerText = t('adminusers_modal_edit_title');
        document.getElementById('userId').value = u.id;
        document.getElementById('userName').value = u.username;
        document.getElementById('userPassword').value = '';
        document.getElementById('userRole').value = u.role;
        document.getElementById('userModal').style.display = 'flex';
    }

    function closeUserModal() {
        document.getElementById('userModal').style.display = 'none';
    }

    async function saveUser() {
        const id = document.getElementById('userId').value;
        const data = {
            username: document.getElementById('userName').value,
            password: document.getElementById('userPassword').value,
            role: document.getElementById('userRole').value
        };

        if (!id && !data.password) {
            showToast(t('adminusers_password_required'), 'danger');
            return;
        }

        const url = id ? `/api/admin/users/${id}` : '/api/admin/users';
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            showToast(t('adminusers_save_success'), 'success');
            closeUserModal();
            loadUsers();
        } else {
            const err = await res.json();
            showToast(err.error || t('adminusers_save_failed'), 'danger');
        }
    }

    async function deleteUser(id) {
        showModal(t('adminusers_delete_confirm_title'), t('adminusers_delete_confirm_msg'), async () => {
            const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showToast(t('adminusers_delete_success'), 'success');
                loadUsers();
            } else {
                const err = await res.json();
                showToast(err.error || t('adminusers_delete_failed'), 'danger');
            }
        });
    }

    let currentViewUserId = null;
    function viewUserLoginLogs(user) {
        currentViewUserId = user.id;
        document.getElementById('loginLogUserName').innerText = `- ${user.username}`;
        document.getElementById('loginLogModal').style.display = 'flex';
        loadUserLoginLogs(user.id);
    }

    function closeLoginLogModal() {
        document.getElementById('loginLogModal').style.display = 'none';
        currentViewUserId = null;
    }

    async function loadUserLoginLogs(userId) {
        const tbody = document.getElementById('loginLogModalBody');
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 30px; color: var(--text-secondary);">${t('login_history_loading')}</td></tr>`;
        
        try {
            const res = await fetch(`/api/admin/users/${userId}/login_logs`);
            if (!res.ok) throw new Error('Failed to load');
            const data = await res.json();
            
            if (!data.logs || data.logs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 30px; color: var(--text-secondary);">${t('login_history_empty')}</td></tr>`;
                return;
            }
            
            tbody.innerHTML = data.logs.map(log => renderAdminLoginLogRow(log)).join('');
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 30px; color: var(--text-secondary);">${t('login_history_load_failed')}</td></tr>`;
        }
    }

    function renderAdminLoginLogRow(log) {
        const uaText = parseUserAgent(log.user_agent);
        const statusBadge = log.is_new_location
            ? `<span class="status-badge status-badge-warning">${t('login_history_status_new')}</span>`
            : (log.is_active 
                ? `<span class="status-badge status-badge-active">${t('login_history_status_active')}</span>`
                : `<span class="status-badge status-badge-inactive">${t('login_history_status_ended')}</span>`);
        
        const actionBtn = log.is_active
            ? `<button onclick="terminateSession(${log.id})" class="btn btn-sm btn-danger" style="padding: 3px 10px; font-size: 11px;">${t('admin_login_logs_btn_terminate')}</button>`
            : `<span style="color: var(--text-secondary); font-size: 12px;">${t('admin_login_logs_ended')}</span>`;
        
        return `
            <tr style="border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                <td style="padding: 12px 16px; font-size: 13px; font-family: monospace;">${log.login_at}</td>
                <td style="padding: 12px 16px; font-size: 13px; font-family: monospace;">${log.ip_address}</td>
                <td style="padding: 12px 16px; font-size: 12px; color: var(--text-secondary);">${uaText}</td>
                <td style="padding: 12px 16px;">${statusBadge}</td>
                <td style="padding: 12px 16px;">${actionBtn}</td>
            </tr>
        `;
    }

    async function terminateSession(logId) {
        showModal(t('admin_terminate_confirm_title'), t('admin_terminate_confirm_msg'), async () => {
            try {
                const res = await fetch(`/api/admin/login_logs/${logId}/terminate`, { method: 'POST' });
                if (res.ok) {
                    showToast(t('admin_terminate_success'), 'success');
                    if (currentViewUserId) {
                        loadUserLoginLogs(currentViewUserId);
                    }
                } else {
                    const err = await res.json();
                    showToast(err.error || t('admin_terminate_failed'), 'danger');
                }
            } catch (e) {
                showToast(t('admin_terminate_failed'), 'danger');
            }
        });
    }

    window.addEventListener('load', loadUsers);
</script>
{% endblock %}
