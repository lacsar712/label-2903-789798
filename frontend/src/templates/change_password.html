{% extends "base.html" %}
{% block title %}修改密码{% endblock %}
{% block content %}
<div class="dashboard-grid" style="display: flex; justify-content: center; align-items: center; margin-top: 50px;">
    <div class="chart-card" style="width: 400px; height: auto; padding: 30px;">
        <h3 style="margin-bottom: 30px; text-align: center;">安全修改密码</h3>
        <form method="POST">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary)">当前密码</label>
                <input type="password" name="old_password" required
                    style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); color: #fff;">
            </div>
            <div class="form-group" style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary)">新密码</label>
                <input type="password" name="new_password" required minlength="6"
                    style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); color: #fff;">
            </div>
            <button type="submit" class="btn" style="width: 100%; padding: 12px; font-weight: 600;">更新访问凭证</button>
        </form>
    </div>
</div>
{% endblock %}
