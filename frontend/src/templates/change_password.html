{% extends "base.html" %}
{% block title %}<span data-i18n="nav_change_password">修改密码</span>{% endblock %}
{% block content %}
<div class="dashboard-grid" style="display: flex; justify-content: center; align-items: center; margin-top: 50px; flex-direction: column; gap: 24px;">
    <div class="chart-card" style="width: 400px; height: auto; padding: 30px;">
        <h3 style="margin-bottom: 30px; text-align: center;" data-i18n="chpwd_title">安全修改密码</h3>
        <form method="POST">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary)" data-i18n="chpwd_old_password">当前密码</label>
                <input type="password" name="old_password" required
                    style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); color: #fff;">
            </div>
            <div class="form-group" style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary)" data-i18n="chpwd_new_password">新密码</label>
                <input type="password" name="new_password" required minlength="6"
                    style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); color: #fff;">
            </div>
            <button type="submit" class="btn" style="width: 100%; padding: 12px; font-weight: 600;" data-i18n="chpwd_submit">更新访问凭证</button>
        </form>
    </div>

    <div class="chart-card" style="width: 400px; height: auto; padding: 30px;">
        <h3 style="margin-bottom: 20px; text-align: center;" data-i18n="chpwd_tour_title">新手引导</h3>
        <p style="color: var(--text-secondary); font-size: 13px; line-height: 1.6; margin-bottom: 20px; text-align: center;" data-i18n="chpwd_tour_desc">
            重温看板功能导引，快速熟悉核心操作。
        </p>
        <button onclick="goToTour()" class="btn" style="width: 100%; padding: 12px; font-weight: 600; background: linear-gradient(135deg, #10b981, #34d399);" data-i18n="chpwd_tour_restart">
            重温引导
        </button>
    </div>
</div>
<script>
function goToTour() {
    localStorage.setItem('manual_tour', 'true');
    window.location.href = '/';
}
</script>
{% endblock %}
