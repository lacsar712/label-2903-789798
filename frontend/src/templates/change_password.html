{% extends "base.html" %}
{% block title %}<span data-i18n="nav_change_password">修改密码</span>{% endblock %}
{% block content %}
<div class="settings-page" style="max-width: 900px; margin: 0 auto;">
    <div class="settings-header">
        <h2 data-i18n="settings_personal_title">个人设置</h2>
        <p class="settings-subtitle" data-i18n="settings_personal_subtitle">管理您的账号安全和登录信息</p>
    </div>

    <div class="settings-grid">
        <div class="chart-card settings-card">
            <h3 style="margin-bottom: 30px; text-align: center;" data-i18n="chpwd_title">安全修改密码</h3>
            <form method="POST">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary)" data-i18n="chpwd_old_password">当前密码</label>
                    <input type="password" name="old_password" required
                        style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); color: #fff;">
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary)" data-i18n="chpwd_new_password">新密码</label>
                    <input type="password" name="new_password" required minlength="6"
                        style="width: 100%; padding: 10px; border-radius: 8px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); color: #fff;">
                </div>
                <button type="submit" class="btn" style="width: 100%; padding: 12px; font-weight: 600;" data-i18n="chpwd_submit">更新访问凭证</button>
            </form>

            <div style="margin-top: 30px; padding-top: 24px; border-top: 1px dashed var(--glass-border);">
                <h3 style="margin-bottom: 20px; text-align: center;" data-i18n="chpwd_tour_title">新手引导</h3>
                <p style="color: var(--text-secondary); font-size: 13px; line-height: 1.6; margin-bottom: 20px; text-align: center;" data-i18n="chpwd_tour_desc">
                    重温看板功能导引，快速熟悉核心操作。
                </p>
                <button onclick="goToTour()" class="btn" style="width: 100%; padding: 12px; font-weight: 600; background: linear-gradient(135deg, #10b981, #34d399);" data-i18n="chpwd_tour_restart">
                    重温引导
                </button>
            </div>
        </div>

        <div class="chart-card settings-card login-history-card">
            <div class="login-history-header">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 8px;">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <span data-i18n="login_history_title">登录足迹</span>
                </h3>
                <p class="login-history-subtitle" data-i18n="login_history_subtitle">最近 20 次登录记录</p>
            </div>

            <div class="login-history-table-wrap">
                <table class="login-history-table">
                    <thead>
                        <tr>
                            <th data-i18n="login_history_col_time">登录时间</th>
                            <th data-i18n="login_history_col_ip">IP地址</th>
                            <th data-i18n="login_history_col_device">设备/浏览器</th>
                            <th data-i18n="login_history_col_status">状态</th>
                        </tr>
                    </thead>
                    <tbody id="loginHistoryBody">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 40px; color: var(--text-secondary);" data-i18n="login_history_loading">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
function goToTour() {
    localStorage.setItem('manual_tour', 'true');
    window.location.href = '/';
}

window.addEventListener('load', loadLoginHistory);
</script>
{% endblock %}
