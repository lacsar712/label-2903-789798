{% extends "base.html" %}
{% block title %}能耗排行榜{% endblock %}
{% block content %}
<div class="ranking-page">
    <div class="ranking-header">
        <div class="ranking-header-left">
            <h2 class="ranking-title">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 10px;">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <span data-i18n="ranking_title">能耗排行榜</span>
            </h2>
            <p class="ranking-subtitle" data-i18n="ranking_subtitle">全部车型百公里电耗排名 · 点击车型跳转至回看板</p>
        </div>
        <div class="ranking-header-right">
            <div class="ranking-stats">
                <div class="stat-item">
                    <span class="stat-label" data-i18n="ranking_stat_total">上榜车型</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label" data-i18n="ranking_stat_avg">平均电耗</span>
                    <span class="stat-value" id="avgConsumption">0</span>
                    <span class="stat-unit">kWh/100km</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label" data-i18n="ranking_stat_best">最优电耗</span>
                    <span class="stat-value best" id="bestConsumption">0</span>
                    <span class="stat-unit">kWh/100km</span>
                </div>
            </div>
        </div>
    </div>

    <div class="ranking-tabs">
        <button class="tab-btn active" data-filter="all" onclick="switchFilter('all')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span data-i18n="ranking_tab_all">全部车型</span>
        </button>
        <button class="tab-btn" data-filter="纯电" onclick="switchFilter('纯电')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            纯电
        </button>
        <button class="tab-btn" data-filter="混动" onclick="switchFilter('混动')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                <path d="M10.59 13.41c.41.41 1.08.41 1.49 0l3.29-3.29c.41-.41.41-1.08 0-1.49s-1.08-.41-1.49 0L12 11.51 8.12 7.63c-.41-.41-1.08-.41-1.49 0s-.41 1.08 0 1.49z"/>
                <circle cx="12" cy="12" r="10"/>
            </svg>
            混动
        </button>
    </div>

    <div class="ranking-sort-hint" id="sortHint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span data-i18n="ranking_sort_hint">主排序：电耗从低到高 · 点击「车重」列切换次要排序</span>
    </div>

    <div class="ranking-table-container">
        <table class="ranking-table">
            <thead>
                <tr>
                    <th style="width: 80px;" data-i18n="ranking_th_rank">排名</th>
                    <th data-i18n="ranking_th_model">车型</th>
                    <th style="width: 100px;" data-i18n="ranking_th_brand">品牌</th>
                    <th style="width: 100px;" data-i18n="ranking_th_type">类型</th>
                    <th style="width: 140px;" data-i18n="ranking_th_power">百公里电耗</th>
                    <th class="sortable-header" onclick="toggleWeightSort()">
                        <span data-i18n="ranking_th_weight">车重</span>
                        <span class="sort-icon" id="weightSortIcon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </span>
                    </th>
                    <th style="width: 120px;" data-i18n="ranking_th_range">续航</th>
                    <th style="width: 120px;" data-i18n="ranking_th_price">价格</th>
                    <th style="width: 100px;" data-i18n="ranking_th_action">操作</th>
                </tr>
            </thead>
            <tbody id="rankingTableBody">
            </tbody>
        </table>
    </div>

    <div class="ranking-empty" id="emptyState" style="display: none;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.3; margin-bottom: 16px;">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p data-i18n="ranking_empty">暂无符合条件的车型数据</p>
    </div>
</div>

<script>
let currentFilter = 'all';
let weightSortOrder = null;

function switchFilter(filter) {
    currentFilter = filter;
    weightSortOrder = null;
    document.getElementById('weightSortIcon').innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
        </svg>
    `;
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
    });
    
    loadRankingData();
}

function toggleWeightSort() {
    const cycles = [null, 'asc', 'desc'];
    const currentIndex = cycles.indexOf(weightSortOrder);
    weightSortOrder = cycles[(currentIndex + 1) % cycles.length];
    
    const icon = document.getElementById('weightSortIcon');
    if (weightSortOrder === 'asc') {
        icon.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sort-active">
                <polyline points="18 15 12 9 6 15"/>
            </svg>
        `;
    } else if (weightSortOrder === 'desc') {
        icon.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sort-active">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        `;
    } else {
        icon.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        `;
    }
    
    loadRankingData();
}

async function loadRankingData() {
    try {
        let url = `/api/ranking/energy?filter=${currentFilter}`;
        if (weightSortOrder) {
            url += `&weight_sort=${weightSortOrder}`;
        }
        
        const res = await fetch(url);
        const data = await res.json();
        
        renderRankingTable(data);
        updateStats(data);
    } catch (e) {
        console.error('Failed to load ranking data:', e);
        showToast(t('toast_ranking_load_failed'), 'danger');
    }
}

function renderRankingTable(data) {
    const tbody = document.getElementById('rankingTableBody');
    const emptyState = document.getElementById('emptyState');
    
    if (!data.vehicles || data.vehicles.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
        return;
    }
    
    emptyState.style.display = 'none';
    
    tbody.innerHTML = data.vehicles.map((v, index) => {
        const rank = index + 1;
        let rankBadge = '';
        let rowClass = '';
        
        if (rank === 1) {
            rankBadge = `<div class="rank-badge gold">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                </svg>
                <span>1</span>
            </div>`;
            rowClass = 'rank-row rank-1';
        } else if (rank === 2) {
            rankBadge = `<div class="rank-badge silver">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                </svg>
                <span>2</span>
            </div>`;
            rowClass = 'rank-row rank-2';
        } else if (rank === 3) {
            rankBadge = `<div class="rank-badge bronze">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                </svg>
                <span>3</span>
            </div>`;
            rowClass = 'rank-row rank-3';
        } else {
            rankBadge = `<div class="rank-badge normal"><span>${rank}</span></div>`;
            rowClass = 'rank-row';
        }
        
        const categoryClass = v.category === '纯电' ? 'category-badge ev' : 'category-badge hybrid';
        
        return `
            <tr class="${rowClass}">
                <td>${rankBadge}</td>
                <td class="model-cell">
                    <span class="model-name">${v.model_name}</span>
                </td>
                <td><span class="brand-text">${v.brand}</span></td>
                <td><span class="${categoryClass}">${v.category}</span></td>
                <td class="consumption-cell">
                    <span class="consumption-value">${v.power_consumption}</span>
                    <span class="consumption-unit">kWh/100km</span>
                </td>
                <td>${v.weight_kg} kg</td>
                <td>${v.range_km} km</td>
                <td>${v.price} ${t('table_price_unit')}</td>
                <td>
                    <button class="review-btn" onclick="goToReview('${v.brand}', '${v.model_name}')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                            <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                        </svg>
                        <span data-i18n="ranking_btn_review">回看板</span>
                    </button>
                </td>
            </tr>
        `;
    }).join('');
}

function updateStats(data) {
    document.getElementById('totalCount').textContent = data.total || 0;
    document.getElementById('avgConsumption').textContent = data.avg_consumption || '0.0';
    document.getElementById('bestConsumption').textContent = data.best_consumption || '0.0';
}

function goToReview(brand, modelName) {
    const url = `{{ url_for('main.home') }}?brand=${encodeURIComponent(brand)}&model=${encodeURIComponent(modelName)}`;
    window.location.href = url;
}

window.addEventListener('load', () => {
    loadRankingData();
});
</script>
{% endblock %}
